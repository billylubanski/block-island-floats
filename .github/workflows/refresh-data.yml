name: Refresh Float Data

on:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_changes: ${{ steps.changes.outputs.has_changes }}

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chromium
        run: python -m playwright install chromium

      - name: Refresh data artifacts
        run: python scripts/refresh_data.py refresh

      - name: Run tests
        run: python -m pytest -q

      - name: Validate generated data
        run: python scripts/refresh_data.py validate

      - name: Publish refresh summary
        if: always()
        run: |
          if [ -f generated/refresh_summary.md ]; then
            cat generated/refresh_summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Detect repository changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No source data changes detected." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload refresh artifacts
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: refresh-artifacts
          path: |
            all_floats_final.json
            floats.db
            scraped_data/floats_*.json
            generated/refresh_manifest.json
            generated/refresh_summary.md
            generated/legacy_row_audit.json
          if-no-files-found: error
          retention-days: 7

  open-refresh-pr:
    if: needs.refresh.outputs.has_changes == 'true'
    needs: refresh
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Download refresh artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: refresh-artifacts
          path: .

      - name: Open refresh pull request
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11
        with:
          branch: automation/refresh-float-data
          delete-branch: true
          commit-message: Refresh float data artifacts
          title: Refresh Block Island float data
          body-path: generated/refresh_summary.md
          labels: |
            automated
            data-refresh
          add-paths: |
            all_floats_final.json
            floats.db
            scraped_data/floats_*.json
            generated/refresh_manifest.json
            generated/refresh_summary.md
            generated/legacy_row_audit.json
